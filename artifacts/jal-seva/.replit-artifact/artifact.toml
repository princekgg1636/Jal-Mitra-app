kind = "web"
previewPath = "/"
title = "Jal Seva - Water Delivery App"
version = "1.0.0"
id = "artifacts/jal-seva"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19059

[services.development]
run = "pnpm --filter @workspace/jal-seva run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jal-seva", "run", "build" ]
publicDir = "artifacts/jal-seva/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19059"
BASE_PATH = "/"
